baseURL: https://example.invalid/
locale: en-us
title: Chadrick Blog
theme: []
enableRobotsTXT: true

permalinks:
  posts: /posts/:slug/

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

params:
  env: production
  defaultTheme: auto
  ShowCodeCopyButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
